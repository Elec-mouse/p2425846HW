{% extends 'enrol/base.html' %}
{% block content %}
<h3>All Courses</h3>
<ul>
{% for c in courses %}
  {% if user.is_authenticated %}
    <li><a href="{% url 'course_detail' c.pk %}">{{ c.name }} - {{ c.year }}</a></li>
  {% else %}
    <li>{{ c.name }} - {{ c.year }}</li>
  {% endif %}
{% endfor %}
</ul>
{% endblock %}
