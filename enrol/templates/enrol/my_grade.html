{% extends 'enrol/base.html' %}
{% block content %}
<h3>My Grades</h3>
{% if grades %}
  <table border="1" cellpadding="8" cellspacing="0">
    <tr>
      <th>Course Name</th>
      <th>Year</th>
      <th>Grade</th>
    </tr>
    {% for g in grades %}
    <tr>
      <td>{{ g.course.name }}</td>
      <td>{{ g.course.year }}</td>
      <td>{{ g.grade }}</td>
    </tr>
    {% endfor %}
  </table>
{% else %}
  <p>You have not registered for any courses yet.</p>
{% endif %}
{% endblock %}
